# ──────────────────────────────────────────────────────────────────────────────
# APTrade CI/CD Pipeline
#
# All jobs run on a self-hosted Mac runner (free, unlimited minutes).
# The Mac has JDK 17, Android SDK, and Xcode pre-installed.
#
# Four parallel tracks:
#   • Swift (self-hosted Mac) — build + test the SwiftPM package (193 XCTest tests)
#   • KMP JVM (self-hosted Mac) — test the Kotlin Multiplatform shared module on JVM
#   • Desktop JVM (self-hosted Mac) — test the Compose Desktop app on JVM
#   • Android (self-hosted Mac) — run androidApp debug unit tests
#
# A fifth job assembles the Shared.xcframework on macOS, only on main.
# ──────────────────────────────────────────────────────────────────────────────

stages:
  - test
  - build

# ── Shared base for all jobs on the self-hosted Mac runner ──────────────────
# Uses the local shell executor on the registered Mac runner.
# No Docker image needed — tools are pre-installed on the host.
# JAVA_HOME is set explicitly here because the shell executor uses bash,
# not zsh, so ~/.zshrc is not sourced and JAVA_HOME would fall back to
# the system default (Amazon Corretto 11). Setting it as a CI variable
# ensures JDK 17 is used for all Gradle jobs.
.mac-base:
  tags:
    - self-hosted-mac
  variables:
    DEVELOPER_DIR: /Applications/Xcode.app
    ANDROID_HOME: /Users/ap/Library/Android/sdk
    ANDROID_SDK_ROOT: /Users/ap/Library/Android/sdk
    # Explicit JDK 17 path — overrides system default (Corretto 11).
    # The shell executor uses bash and does not source ~/.zshrc.
    JAVA_HOME: /opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home

# ── Shared base for Gradle jobs ─────────────────────────────────────────────────
# Extends .mac-base and writes sdk.dir to local.properties so the Android
# Gradle Plugin can find the SDK. No download needed — SDK is pre-installed.
.gradle-base:
  extends: .mac-base
  before_script:
    # Write sdk.dir so the Android Gradle Plugin resolves the SDK path.
    # All tools (JDK 17, Android SDK) are pre-installed on the host Mac.
    - echo "sdk.dir=${ANDROID_HOME}" > local.properties

# ── Shared Gradle cache configuration ─────────────────────────────────────────
# Keyed on gradle-wrapper.properties so the cache is invalidated when the
# Gradle version changes.
.gradle-cache: &gradle-cache
  key:
    files:
      - gradle/wrapper/gradle-wrapper.properties
  paths:
    - .gradle/
    - ~/.gradle/caches/

# ══════════════════════════════════════════════════════════════════════════════
# STAGE: test
# ══════════════════════════════════════════════════════════════════════════════

# ── KMP: build Shared.xcframework (all branches) ──────────────────────────────
# Builds the Shared.xcframework so swift-test can consume it via `needs`.
# Package.swift declares Shared as a binaryTarget pointing to this path, so
# swift build fails if the framework is absent.
kmp-xcframework-test:
  extends: .gradle-base
  stage: test
  cache:
    <<: *gradle-cache
  script:
    - ./gradlew :shared:assembleSharedXCFramework --no-daemon
  artifacts:
    # Pass the XCFramework to swift-test via needs/artifacts.
    name: "Shared-XCFramework-test-${CI_COMMIT_SHORT_SHA}"
    paths:
      - shared/build/XCFrameworks/release/Shared.xcframework
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── Swift: build + test ───────────────────────────────────────────────────────
# Builds the SwiftPM package and runs all 193 XCTest tests across the four
# Clean Architecture layers (Domain, Application, Infrastructure, App).
# needs: kmp-xcframework-test so the Shared.xcframework binary artifact is
# present before swift build runs (Package.swift binaryTarget requirement).
swift-test:
  extends: .mac-base
  stage: test
  needs:
    - job: kmp-xcframework-test
      artifacts: true
  cache:
    key:
      files:
        - Package.resolved
    paths:
      - .build/
  script:
    - swift build
    - swift test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── KMP: JVM unit tests ───────────────────────────────────────────────────────
# Runs the Kotlin Multiplatform shared module's commonTest suite on the JVM
# target. Uses the host Mac's JDK 17 via JAVA_HOME CI variable.
kmp-jvm-test:
  extends: .gradle-base
  stage: test
  cache:
    <<: *gradle-cache
  script:
    - ./gradlew :shared:jvmTest --no-daemon
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── Desktop: JVM unit tests ───────────────────────────────────────────────────
# Runs the Compose Desktop app's test suite on the JVM target.
# Uses the host Mac's JDK 17 via JAVA_HOME CI variable.
desktop-jvm-test:
  extends: .gradle-base
  stage: test
  cache:
    <<: *gradle-cache
  script:
    - ./gradlew :desktopApp:test --no-daemon
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── Android: debug unit tests ─────────────────────────────────────────────────
# Runs the androidApp's debug unit tests (ViewModel and domain tests).
# Uses the host Mac's Android SDK and JDK 17 via CI variables.
# allow_failure: true kept as safety net for the first run.
android-unit-test:
  extends: .gradle-base
  stage: test
  cache:
    <<: *gradle-cache
  script:
    - ./gradlew :androidApp:testDebugUnitTest --no-daemon
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ══════════════════════════════════════════════════════════════════════════════
# STAGE: build
# ══════════════════════════════════════════════════════════════════════════════

# ── KMP: assemble Shared.xcframework ─────────────────────────────────────────
# Assembles the Shared.xcframework (iosArm64, iosSimulatorArm64, macosArm64).
# Only runs on main — expensive and only needed for integration / release.
# Artifact kept for 7 days for download from the pipeline UI.
kmp-xcframework:
  extends: .gradle-base
  stage: build
  cache:
    <<: *gradle-cache
  script:
    - ./gradlew :shared:assembleSharedXCFramework --no-daemon
  artifacts:
    name: "Shared-XCFramework-${CI_COMMIT_SHORT_SHA}"
    paths:
      - shared/build/XCFrameworks/release/Shared.xcframework
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
