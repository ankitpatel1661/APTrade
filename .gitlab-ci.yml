# ──────────────────────────────────────────────────────────────────────────────
# APTrade CI/CD Pipeline
#
# Four parallel tracks:
#   • Swift (macOS runner) — build + test the SwiftPM package (193 XCTest tests)
#   • KMP JVM (Linux runner) — test the Kotlin Multiplatform shared module on JVM
#   • Desktop JVM (Linux runner) — test the Compose Desktop app on JVM
#   • Android (Linux runner) — run androidApp debug unit tests
#
# A fifth job assembles the Shared.xcframework on macOS, but only on main, since
# it is expensive and only needed for integration / release.
# ──────────────────────────────────────────────────────────────────────────────

stages:
  - test
  - build

# ── Shared base for all macOS jobs ────────────────────────────────────────────
# Uses the GitLab SaaS M1 runner with the latest Xcode 26 image.
# DEVELOPER_DIR is required so that `swift test` finds XCTest (full Xcode,
# not just the Command Line Tools).
.macos-base:
  tags:
    - saas-macos-medium-m1
  image: macos-26-xcode-26
  variables:
    DEVELOPER_DIR: /Applications/Xcode.app

# ── Shared base for all Linux jobs ────────────────────────────────────────────
.linux-base:
  tags:
    - saas-linux-small-amd64
  image: eclipse-temurin:21-jdk

# ── Shared Gradle cache configuration ─────────────────────────────────────────
# YAML anchor reused by all Gradle jobs so the cache definition stays DRY.
# Keyed on gradle-wrapper.properties so the cache is invalidated when the
# Gradle version changes.
.gradle-cache: &gradle-cache
  key:
    files:
      - gradle/wrapper/gradle-wrapper.properties
  paths:
    - .gradle/
    - ~/.gradle/caches/

# ── Shared before_script for macOS Gradle jobs ──────────────────────────────
# settings.gradle.kts always includes :androidApp and :shared (which both apply
# the Android Gradle Plugin). Gradle configures ALL subprojects before running
# any task, so even an XCFramework-only build requires a valid Android SDK.
# We install the macOS Android command-line tools and the minimum required SDK
# components (platforms;android-35) so the AGP can complete configuration.
# ANDROID_HOME is set to ~/android-sdk to avoid permission issues.
.macos-android-sdk: &macos-android-sdk
  - export ANDROID_HOME="${HOME}/android-sdk"
  - export ANDROID_SDK_ROOT="${HOME}/android-sdk"
  - mkdir -p "${ANDROID_HOME}/cmdline-tools"
  - curl -fsSL https://dl.google.com/android/repository/commandlinetools-mac-11076708_latest.zip -o /tmp/cmdline-tools.zip
  - unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extract
  - mv /tmp/cmdline-tools-extract/cmdline-tools "${ANDROID_HOME}/cmdline-tools/latest"
  - export PATH="${ANDROID_HOME}/cmdline-tools/latest/bin:${ANDROID_HOME}/platform-tools:${PATH}"
  - yes | sdkmanager --licenses > /dev/null 2>&1 || true
  - sdkmanager "platforms;android-35"
  - echo "sdk.dir=${ANDROID_HOME}" > local.properties

# ══════════════════════════════════════════════════════════════════════════════
# STAGE: test
# ══════════════════════════════════════════════════════════════════════════════

# ── KMP: build Shared.xcframework (all branches) ──────────────────────────────
# Builds the Shared.xcframework so swift-test can consume it via `needs`.
# Package.swift declares Shared as a binaryTarget pointing to this path, so
# swift build fails if the framework is absent.
# Runs on every branch so swift-test always has the artifact.
kmp-xcframework-test:
  extends: .macos-base
  stage: test
  before_script:
    # Install the minimum Android SDK so the AGP can configure :shared and
    # :androidApp during Gradle's project configuration phase.
    # See .macos-android-sdk anchor comment above for full explanation.
    - *macos-android-sdk
  cache:
    <<: *gradle-cache
  script:
    - ./gradlew :shared:assembleSharedXCFramework --no-daemon
  artifacts:
    # Pass the XCFramework to swift-test via needs/artifacts.
    name: "Shared-XCFramework-test-${CI_COMMIT_SHORT_SHA}"
    paths:
      - shared/build/XCFrameworks/release/Shared.xcframework
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── Swift: build + test ───────────────────────────────────────────────────────
# Builds the SwiftPM package and runs all 193 XCTest tests across the four
# Clean Architecture layers (Domain, Application, Infrastructure, App).
# needs: kmp-xcframework-test so the Shared.xcframework binary artifact is
# present before swift build runs (Package.swift binaryTarget requirement).
swift-test:
  extends: .macos-base
  stage: test
  needs:
    # Depend on kmp-xcframework-test to ensure Shared.xcframework exists
    # before swift build attempts to resolve the binaryTarget in Package.swift.
    - job: kmp-xcframework-test
      artifacts: true
  cache:
    # Key on Package.resolved so the cache is invalidated when dependencies change.
    key:
      files:
        - Package.resolved
    paths:
      - .build/
  script:
    - swift build
    - swift test
  rules:
    # Run on MR pipelines and on every push to any branch (including main).
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── KMP: JVM unit tests ───────────────────────────────────────────────────────
# Runs the Kotlin Multiplatform shared module's commonTest suite on the JVM
# target. This is fast and cheap — no macOS or Xcode required.
# Covers Money, Quote, FetchMarketQuotes, and YahooMarketDataRepository tests.
kmp-jvm-test:
  extends: .linux-base
  stage: test
  cache:
    # Key on the Gradle wrapper properties so the cache is invalidated when
    # the Gradle version changes.
    <<: *gradle-cache
  script:
    - ./gradlew :shared:jvmTest --no-daemon
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── Desktop: JVM unit tests ───────────────────────────────────────────────────
# Runs the Compose Desktop app's test suite on the JVM target. Covers the
# ViewModel, store, design-kit math, and infrastructure tests added in the
# desktopApp module (FormattingTest, SmokeTest, ConfigDirTest,
# ValueCardMathTest, FileWatchlistStoreTest).
# image: eclipse-temurin:17-jdk is used instead of 21-jdk because
# desktopApp/build.gradle.kts sets jvmTarget = JVM_17. Running under JDK 21
# causes a compileJava(21) vs compileKotlin(17) target mismatch that Gradle
# rejects at configuration time.
desktop-jvm-test:
  extends: .linux-base
  stage: test
  # Override the image from .linux-base: desktopApp targets JVM 17, so we
  # must compile under JDK 17 to avoid the compileJava/compileKotlin mismatch.
  image: eclipse-temurin:17-jdk
  cache:
    # Shares the same Gradle cache key as kmp-jvm-test since both use the
    # same Gradle wrapper version.
    <<: *gradle-cache
  script:
    - ./gradlew :desktopApp:test --no-daemon
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── Android: debug unit tests ─────────────────────────────────────────────────
# Runs the androidApp's debug unit tests (ViewModel and domain tests).
# The before_script installs the Android SDK build-tools and platform via
# sdkmanager. sdk.dir is written to local.properties so the Android Gradle
# plugin resolves the SDK path.
# image: eclipse-temurin:17-jdk matches the androidApp jvmTarget (JVM_17).
# allow_failure: true is kept as a safety net while the SDK install is
# validated. Remove once the job is confirmed green.
android-unit-test:
  extends: .linux-base
  stage: test
  # Override image to JDK 17 to match androidApp's jvmTarget = JVM_17.
  image: eclipse-temurin:17-jdk
  cache:
    <<: *gradle-cache
  variables:
    ANDROID_HOME: /root/android-sdk
    ANDROID_SDK_ROOT: /root/android-sdk
  before_script:
    # Install Android command-line tools, then use sdkmanager to install the
    # platform and build-tools required by androidApp (compileSdk 35).
    - apt-get update -qq && apt-get install -y -qq wget unzip
    - mkdir -p ${ANDROID_HOME}/cmdline-tools
    - wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
    - unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extract
    - mv /tmp/cmdline-tools-extract/cmdline-tools ${ANDROID_HOME}/cmdline-tools/latest
    - export PATH="${ANDROID_HOME}/cmdline-tools/latest/bin:${ANDROID_HOME}/platform-tools:${PATH}"
    - yes | sdkmanager --licenses > /dev/null 2>&1 || true
    - sdkmanager "platforms;android-35" "build-tools;35.0.0"
    - echo "sdk.dir=${ANDROID_HOME}" > local.properties
  script:
    - ./gradlew :androidApp:testDebugUnitTest --no-daemon
  # allow_failure: remove once the Android SDK install is confirmed green.
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ══════════════════════════════════════════════════════════════════════════════
# STAGE: build
# ══════════════════════════════════════════════════════════════════════════════

# ── KMP: assemble Shared.xcframework ─────────────────────────────────────────
# Assembles the Shared.xcframework (iosArm64, iosSimulatorArm64, macosArm64)
# from the Kotlin Multiplatform shared module. This artifact is consumed by the
# Swift package via a binaryTarget in Package.swift.
#
# Only runs on main to avoid the cost on every branch push. The artifact is
# kept for 7 days so it can be downloaded by downstream jobs or developers.
kmp-xcframework:
  extends: .macos-base
  stage: build
  before_script:
    # Install the minimum Android SDK so the AGP can configure :shared and
    # :androidApp during Gradle's project configuration phase.
    # See .macos-android-sdk anchor comment above for full explanation.
    - *macos-android-sdk
  cache:
    key:
      files:
        - gradle/wrapper/gradle-wrapper.properties
    paths:
      - .gradle/
      - ~/.gradle/caches/
  script:
    - ./gradlew :shared:assembleSharedXCFramework --no-daemon
  artifacts:
    # Expose the built XCFramework so it can be downloaded from the pipeline UI
    # or consumed by future jobs.
    name: "Shared-XCFramework-${CI_COMMIT_SHORT_SHA}"
    paths:
      - shared/build/XCFrameworks/release/Shared.xcframework
    expire_in: 7 days
  rules:
    # Only assemble the XCFramework on the main branch — it is expensive and
    # only needed for integration / release workflows.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
